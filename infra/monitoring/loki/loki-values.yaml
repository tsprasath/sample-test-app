# Helm values for Loki stack
# helm install loki grafana/loki-stack -f loki-values.yaml -n monitoring

loki:
  enabled: true
  isDefault: true
  deploymentMode: SingleBinary
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    compactor:
      retention_enabled: true
      retention_delete_delay: 2h
      retention_delete_worker_count: 150
    limits_config:
      retention_period: 336h  # 14 days
      max_query_series: 500
      max_query_parallelism: 2
      ingestion_rate_mb: 10
      ingestion_burst_size_mb: 20
    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
  singleBinary:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    persistence:
      enabled: true
      size: 20Gi

promtail:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  config:
    clients:
      - url: http://loki:3100/loki/api/v1/push
    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_controller_name]
            regex: ([0-9a-z-.]+?)(-[0-9a-f]{8,10})?
            action: replace
            target_label: __tmp_controller_name
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name, __tmp_controller_name]
            regex: (.+);.*
            action: replace
            target_label: app
          - source_labels: [__tmp_controller_name]
            regex: (.+)
            action: replace
            target_label: app
          - source_labels: [__meta_kubernetes_pod_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: service
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
        pipeline_stages:
          - cri: {}
          - json:
              expressions:
                level: level
                msg: message
                service: service
                timestamp: timestamp
          - labels:
              level:
              service:
          - timestamp:
              source: timestamp
              format: RFC3339
          - output:
              source: msg
