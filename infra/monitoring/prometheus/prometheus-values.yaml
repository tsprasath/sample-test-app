# Helm values for kube-prometheus-stack
# helm install prometheus prometheus-community/kube-prometheus-stack -f prometheus-values.yaml -n monitoring

prometheus:
  prometheusSpec:
    retention: 30d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: "2"
        memory: 8Gi
    additionalScrapeConfigs:
      # Jenkins metrics
      - job_name: "jenkins"
        metrics_path: /prometheus
        static_configs:
          - targets: ["jenkins.ci.svc.cluster.local:8080"]
        scheme: http

      # Application metrics
      - job_name: "app-metrics"
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port, __meta_kubernetes_pod_ip]
            action: replace
            target_label: __address__
            regex: (.+);(.+)
            replacement: $2:$1
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: service

      # API Gateway metrics
      - job_name: "api-gateway"
        metrics_path: /metrics
        static_configs:
          - targets: ["api-gateway.default.svc.cluster.local:9090"]

grafana:
  enabled: true
  adminPassword: null  # Use existing secret
  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password
  persistence:
    enabled: true
    size: 10Gi
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: "default"
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
  dashboardsConfigMaps:
    default: grafana-dashboards
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: monitoring
    datasources:
      enabled: true
      label: grafana_datasource

alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ["alertname", "namespace", "service"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: "slack-notifications"
      routes:
        - match:
            severity: critical
          receiver: "slack-critical"
          repeat_interval: 1h
    receivers:
      - name: "slack-notifications"
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/slack-webhook-url
            channel: "#alerts"
            send_resolved: true
            title: '{{ template "slack.default.title" . }}'
            text: '{{ template "slack.default.text" . }}'
      - name: "slack-critical"
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/slack-webhook-url
            channel: "#alerts-critical"
            send_resolved: true
            title: '[CRITICAL] {{ template "slack.default.title" . }}'
            text: '{{ template "slack.default.text" . }}'

nodeExporter:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 64Mi

kubeStateMetrics:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ServiceMonitor for auth-service
additionalServiceMonitors:
  - name: auth-service-monitor
    selector:
      matchLabels:
        app: auth-service
    namespaceSelector:
      matchNames:
        - default
    endpoints:
      - port: http-metrics
        path: /metrics
        interval: 15s
