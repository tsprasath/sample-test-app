---
# ═══════════════════════════════════════════════════════
# Default ServiceAccount — Auto-attach imagePullSecrets
# ═══════════════════════════════════════════════════════
# Every pod in the namespace auto-uses the OCIR registry secret.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: default
imagePullSecrets:
  - name: ocir-registry
