---
# ═══════════════════════════════════════════════════════
# ResourceQuota — Base limits (overlays adjust per env)
# ═══════════════════════════════════════════════════════

apiVersion: v1
kind: ResourceQuota
metadata:
  name: app-quota
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    pods: "50"
    services: "20"
    persistentvolumeclaims: "10"
