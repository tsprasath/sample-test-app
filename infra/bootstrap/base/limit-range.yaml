---
# ═══════════════════════════════════════════════════════
# LimitRange — Default container resource constraints
# ═══════════════════════════════════════════════════════

apiVersion: v1
kind: LimitRange
metadata:
  name: app-limits
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "4"
        memory: 8Gi
    - type: PersistentVolumeClaim
      max:
        storage: 50Gi
