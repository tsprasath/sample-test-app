apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ═══════════════════════════════════════════════════════
# Bootstrap Base — shared across all environments
# ═══════════════════════════════════════════════════════
# Overlays (dev/staging/prod) set namespace + env patches.

resources:
  - namespaces.yaml
  - registry-secret.yaml
  - default-sa-patch.yaml
  - resource-quota.yaml
  - limit-range.yaml
  - network-policies.yaml
  - reloader.yaml

commonLabels:
  app.kubernetes.io/managed-by: ai-devops
  app.kubernetes.io/part-of: diksha-dev
