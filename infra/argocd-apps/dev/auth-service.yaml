apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth-service-dev
  namespace: argocd
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: diksha-dev
    diksha.dev/environment: dev
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/tsprasath/ai-devops.git
    targetRevision: main
    path: infra/helm-charts/auth-service
    helm:
      valueFiles:
        - values.yaml           # base defaults
        - values-dev.yaml    # env-specific (Jenkins updates image.tag here)
  destination:
    server: https://kubernetes.default.svc
    namespace: diksha-app-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false    # Bootstrap creates namespaces
      - PrunePropagationPolicy=foreground
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
