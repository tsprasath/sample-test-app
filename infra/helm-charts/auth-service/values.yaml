# ═══════════════════════════════════════════════════════
# auth-service — Base Helm Values (shared defaults)
# ═══════════════════════════════════════════════════════
# Per-env overrides: values-dev.yaml, values-staging.yaml, values-prod.yaml
# Jenkins CI updates image.tag in the environment-specific file.
# ArgoCD merges base + env values at deploy time.

replicaCount: 2

image:
  repository: bom.ocir.io/diksha/diksha-dev/auth-service
  tag: latest    # ← Jenkins CI overwrites this in values-{env}.yaml
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ocir-registry

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

probes:
  liveness:
    path: /health
    port: 3000
    initialDelaySeconds: 15
    periodSeconds: 10
  readiness:
    path: /ready
    port: 3000
    initialDelaySeconds: 5
    periodSeconds: 5

env:
  NODE_ENV: production

secrets:
  - name: JWT_SECRET
    secretName: auth-secrets
    secretKey: JWT_SECRET

serviceAccount:
  create: true
  name: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

containerSecurityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

podAnnotations:
  reloader.stakater.com/auto: "true"

networkPolicy:
  enabled: true
