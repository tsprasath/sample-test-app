# auth-service — STAGING Environment Overrides
# ═══════════════════════════════════════════════════════

image:
  tag: latest  # ← Promoted from dev by Jenkins promote stage

replicaCount: 2

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5

env:
  NODE_ENV: staging
  LOG_LEVEL: info
