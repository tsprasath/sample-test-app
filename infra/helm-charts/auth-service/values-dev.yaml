# ═══════════════════════════════════════════════════════
# auth-service — DEV Environment Overrides
# ═══════════════════════════════════════════════════════
# Jenkins CI updates image.tag here after a successful build.
# ArgoCD watches this file for changes.

image:
  tag: latest  # ← Updated by Jenkins CI (e.g., "abc1234-42")

replicaCount: 1

autoscaling:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

env:
  NODE_ENV: development
  LOG_LEVEL: debug
