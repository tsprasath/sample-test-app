# ═══════════════════════════════════════════════════════
# auth-service — PROD Environment Overrides
# ═══════════════════════════════════════════════════════

image:
  tag: latest  # ← Promoted from staging with manual approval

replicaCount: 3

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

env:
  NODE_ENV: production
  LOG_LEVEL: warn
