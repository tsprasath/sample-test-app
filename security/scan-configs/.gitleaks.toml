title = "Gitleaks Configuration"

[extend]
useDefault = true

[[rules]]
id = "oci-api-key"
description = "Oracle Cloud Infrastructure API Key"
regex = '''-----BEGIN (RSA )?PRIVATE KEY-----'''
tags = ["oci", "key", "private"]

[[rules]]
id = "oci-auth-token"
description = "OCI Auth Token"
regex = '''(?i)(oci[_\-]?auth[_\-]?token|oci[_\-]?token)\s*[=:]\s*['"]?[\w\-\.]{20,}['"]?'''
tags = ["oci", "token"]

[[rules]]
id = "oci-tenancy-ocid"
description = "OCI Tenancy OCID in config"
regex = '''ocid1\.tenancy\.oc1\.\.[a-z0-9]{60}'''
tags = ["oci", "ocid"]

[[rules]]
id = "oci-compartment-ocid"
description = "OCI Compartment OCID"
regex = '''ocid1\.compartment\.oc1\.\.[a-z0-9]{60}'''
tags = ["oci", "ocid"]

[allowlist]
description = "Global allowlist"
paths = [
    '''(^|/)\.gitleaks\.toml$''',
    '''(^|/)vendor/''',
    '''(^|/)node_modules/''',
    '''\.test\.(js|ts)$''',
]
