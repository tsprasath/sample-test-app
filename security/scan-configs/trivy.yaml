severity:
  - CRITICAL
  - HIGH

ignore-unfixed: true

format: table

output: trivy-report.txt

exit-code: 1

vulnerability:
  type:
    - os
    - library

image:
  removed-pkgs: false
  input: ""

scan:
  skip-dirs:
    - /usr/local/lib/node_modules
  security-checks:
    - vuln
    - secret
    - config
